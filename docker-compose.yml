services:
  # Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: soliferme-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "${ZOOKEEPER_BIND_IP:-127.0.0.1}:${ZOOKEEPER_PORT_EXTERNAL:-2181}:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - soliferme-network

  # Apache Kafka
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: soliferme-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://${KAFKA_ADVERTISED_HOST:-127.0.0.1}:${KAFKA_PORT_EXTERNAL:-29092}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_JMX_PORT: 9997
      KAFKA_JMX_HOSTNAME: kafka
    ports:
      - "${KAFKA_BIND_IP:-127.0.0.1}:${KAFKA_PORT_EXTERNAL:-29092}:29092"
      - "127.0.0.1:9997:9997"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - soliferme-network
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 30"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s

  # Kafka Exporter — scrapes Kafka metrics for Prometheus
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: soliferme-kafka-exporter
    restart: unless-stopped
    command:
      - --kafka.server=kafka:9092
      - --web.listen-address=:9308
    ports:
      - "127.0.0.1:9308:9308"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - soliferme-network

  # Zookeeper Exporter — scrapes ZK metrics for Prometheus
  zookeeper-exporter:
    image: dabealu/zookeeper-exporter:latest
    container_name: soliferme-zk-exporter
    restart: unless-stopped
    command:
      - --zk-hosts=zookeeper:2181
      - --listen=0.0.0.0:9141
    ports:
      - "127.0.0.1:9141:9141"
    depends_on:
      - zookeeper
    networks:
      - soliferme-network

  # Prometheus — time-series store
  prometheus:
    image: prom/prometheus:latest
    container_name: soliferme-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "0.0.0.0:9090:9090"
    networks:
      - soliferme-network

  # Grafana — dashboard UI
  grafana:
    image: grafana/grafana:latest
    container_name: soliferme-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-soliferme2026}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://${SERVER_HOST:-127.0.0.1}:${GRAFANA_PORT_EXTERNAL:-33000}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${GRAFANA_PORT_EXTERNAL:-33000}:3000"
    depends_on:
      - prometheus
    networks:
      - soliferme-network
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: soliferme-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-soliferme2026}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-soliferme}
    ports:
      - "${MONGO_PORT_EXTERNAL:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - soliferme-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ... Service AI Python (Flask)
  ai-service:
    build:
      context: ./Backend
      dockerfile: src/services/Dockerfile
    container_name: soliferme-ai-service
    restart: unless-stopped
    environment:
      - FLASK_PORT=${AI_SERVICE_PORT:-5001}
      - AI_MODE=basic
      - MODEL_PATH=/app/models
      - PYTHONUNBUFFERED=1
    ports:
      - "${AI_SERVICE_PORT_EXTERNAL:-5001}:${AI_SERVICE_PORT:-5001}"
    volumes:
      - ./Backend/models:/app/models
      - ai_uploads:/app/uploads
    networks:
      - soliferme-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Backend API Node.js
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: soliferme-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${BACKEND_PORT:-5000}
      - MONGODB_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-soliferme2026}@mongodb:27017/${MONGO_DATABASE:-soliferme}?authSource=admin
      - JWT_SECRET=${JWT_SECRET:-votre_secret_jwt_super_securise_2026}
      - AI_SERVICE_URL=http://ai-service:${AI_SERVICE_PORT:-5001}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://${SERVER_HOST:-72.62.71.97}:${FRONTEND_PORT_EXTERNAL:-38000}}
      - KAFKA_ENABLED=${KAFKA_ENABLED:-true}
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=${KAFKA_CLIENT_ID:-fruitytrack-backend}
      - KAFKA_TOPIC_PREFIX=${KAFKA_TOPIC_PREFIX:-fruitytrack}
      - ALERT_CONSUMER_ENABLED=${ALERT_CONSUMER_ENABLED:-true}
      - ALERT_CONSUMER_GROUP_ID=${ALERT_CONSUMER_GROUP_ID:-fruitytrack-alert-consumer}
      - ALERT_MIN_LEVEL=${ALERT_MIN_LEVEL:-warning}
      - ALERT_COOLDOWN_SECONDS=${ALERT_COOLDOWN_SECONDS:-120}
      - ALERT_RULE_MAX_AI_MS=${ALERT_RULE_MAX_AI_MS:-2000}
      - ALERT_RULE_MAX_PROCESSING_MS=${ALERT_RULE_MAX_PROCESSING_MS:-5000}
      - ALERT_EMAIL_ENABLED=${ALERT_EMAIL_ENABLED:-false}
      - ALERT_EMAIL_FROM=${ALERT_EMAIL_FROM:-noreply@fruitytrack.local}
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO:-}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - ALERT_WEBHOOK_ENABLED=${ALERT_WEBHOOK_ENABLED:-false}
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
      - ALERT_WEBHOOK_AUTH_HEADER=${ALERT_WEBHOOK_AUTH_HEADER:-}
      - ALERT_WEBHOOK_TIMEOUT_MS=${ALERT_WEBHOOK_TIMEOUT_MS:-5000}
    ports:
      - "${BACKEND_PORT_EXTERNAL:-35000}:${BACKEND_PORT:-5000}"
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    depends_on:
      mongodb:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - soliferme-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # Frontend React (Nginx)
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: soliferme-frontend
    restart: unless-stopped
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://${SERVER_HOST:-72.62.71.97}:${BACKEND_PORT_EXTERNAL:-35000}}
    ports:
      - "${FRONTEND_PORT_EXTERNAL:-38000}:80"
    depends_on:
      - backend
    networks:
      - soliferme-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:38000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
networks:
  soliferme-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  zookeeper-data:
  zookeeper-logs:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  ai_uploads:
    driver: local
  backend_uploads:
    driver: local
  backend_logs:
    driver: local
  kafka_data:
    driver: local
