version: '3.8'

services:
  # Zookeeper (Kafka dependency)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: soliferme-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "${ZOOKEEPER_PORT_EXTERNAL:-2181}:2181"
    networks:
      - soliferme-network

  # Apache Kafka event bus
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: soliferme-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:${KAFKA_PORT_EXTERNAL:-9092}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    ports:
      - "${KAFKA_PORT_EXTERNAL:-9092}:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - soliferme-network

  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: soliferme-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-soliferme2026}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-soliferme}
    ports:
      - "${MONGO_PORT_EXTERNAL:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - soliferme-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # Service AI Python (Flask)
  ai-service:
    build:
      context: ./Backend
      dockerfile: src/services/Dockerfile
    container_name: soliferme-ai-service
    restart: unless-stopped
    environment:
      - FLASK_PORT=${AI_SERVICE_PORT:-5001}
      - AI_MODE=basic
      - MODEL_PATH=/app/models
      - PYTHONUNBUFFERED=1
    ports:
      - "${AI_SERVICE_PORT_EXTERNAL:-5001}:${AI_SERVICE_PORT:-5001}"
    volumes:
      - ./Backend/models:/app/models
      - ai_uploads:/app/uploads
    networks:
      - soliferme-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Backend API Node.js
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: soliferme-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${BACKEND_PORT:-5000}
      - MONGODB_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-soliferme2026}@mongodb:27017/${MONGO_DATABASE:-soliferme}?authSource=admin
      - JWT_SECRET=${JWT_SECRET:-votre_secret_jwt_super_securise_2026}
      - AI_SERVICE_URL=http://ai-service:${AI_SERVICE_PORT:-5001}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - KAFKA_ENABLED=${KAFKA_ENABLED:-true}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:9092}
      - KAFKA_CLIENT_ID=${KAFKA_CLIENT_ID:-fruitytrack-backend}
      - KAFKA_TOPIC_PREFIX=${KAFKA_TOPIC_PREFIX:-fruitytrack}
    ports:
      - "${BACKEND_PORT_EXTERNAL:-35000}:${BACKEND_PORT:-5000}"
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    depends_on:
      mongodb:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - soliferme-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # Frontend React (Nginx)
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: soliferme-frontend
    restart: unless-stopped
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:${BACKEND_PORT_EXTERNAL:-35000}}
    ports:
      - "${FRONTEND_PORT_EXTERNAL:-38000}:80"
    depends_on:
      - backend
    networks:
      - soliferme-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  soliferme-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  ai_uploads:
    driver: local
  backend_uploads:
    driver: local
  backend_logs:
    driver: local
  kafka_data:
    driver: local
