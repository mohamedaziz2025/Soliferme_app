apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: soliferme
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: soliferme-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: soliferme-config
          env:
            - name: PORT
              value: "5000"
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: soliferme-secrets
                  key: MONGODB_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: soliferme-secrets
                  key: JWT_SECRET
            - name: AI_SERVICE_URL
              valueFrom:
                secretKeyRef:
                  name: soliferme-secrets
                  key: AI_SERVICE_URL
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: soliferme-secrets
                  key: SMTP_USER
                  optional: true
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: soliferme-secrets
                  key: SMTP_PASSWORD
                  optional: true
            - name: ALERT_WEBHOOK_AUTH_HEADER
              valueFrom:
                secretKeyRef:
                  name: soliferme-secrets
                  key: ALERT_WEBHOOK_AUTH_HEADER
                  optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: soliferme
spec:
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000
