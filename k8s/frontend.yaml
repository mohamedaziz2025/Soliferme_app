apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: soliferme
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: soliferme-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            - name: REACT_APP_API_URL
              valueFrom:
                secretKeyRef:
                  name: soliferme-secrets
                  key: REACT_APP_API_URL
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: soliferme
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: soliferme-ingress
  namespace: soliferme
spec:
  rules:
    - host: soliferme.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
